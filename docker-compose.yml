services:

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: "3000"
      CORS_ORIGIN: "*"
      KODI_URL:      "${KODI_URL:-http://localhost:8080/jsonrpc}"
      ABS_URL:          "${ABS_URL:-http://localhost:13378}"
      ABS_TOKEN_ALEXIS: "${ABS_TOKEN_ALEXIS:-}"
      ABS_TOKEN_MARION: "${ABS_TOKEN_MARION:-}"
      # Log file paths (inside the container after volume mounts below)
      KODI_LOG_PATH: "${KODI_LOG_PATH:-}"
      ABS_LOG_PATH:  "${ABS_LOG_PATH:-}"
      # Metrics source:
      #   - Leave empty on Linux → uses /proc (container-level stats)
      #   - Set to http://host.docker.internal:9182/metrics for Windows host (windows_exporter)
      #   - Set to http://host.docker.internal:9100/metrics for Linux host (node_exporter)
      HOST_METRICS_URL: "${HOST_METRICS_URL:-}"
      # Docker Desktop version (optional — requires "Expose daemon on tcp://localhost:2375" in Docker Desktop Settings)
      # Defaults to http://host.docker.internal:2375 in Docker mode, http://localhost:2375 in local mode.
      DOCKER_API_URL: "${DOCKER_API_URL:-}"
      # PlayStation Network (per user)
      PSN_NPSSO_ALEXIS:     "${PSN_NPSSO_ALEXIS:-}"
      PSN_ONLINE_ID_ALEXIS: "${PSN_ONLINE_ID_ALEXIS:-}"
      PSN_NPSSO_MARION:     "${PSN_NPSSO_MARION:-}"
      PSN_ONLINE_ID_MARION: "${PSN_ONLINE_ID_MARION:-}"
      # UrBackup
      URBACKUP_URL:  "${URBACKUP_URL:-http://host.docker.internal:55414}"
      URBACKUP_USER: "${URBACKUP_USER:-admin}"
      URBACKUP_PASS: "${URBACKUP_PASS:-admin}"
      # Jellyfin
      JELLYFIN_URL:  "${JELLYFIN_URL:-http://host.docker.internal:8096}"
      JELLYFIN_USER: "${JELLYFIN_USER:-a}"
      JELLYFIN_PASS: "${JELLYFIN_PASS:-a}"
      # Booklore
      BOOKLORE_URL:              "${BOOKLORE_URL:-http://host.docker.internal:6060}"
      BOOKLORE_USERNAME_ALEXIS:  "${BOOKLORE_USERNAME_ALEXIS:-}"
      BOOKLORE_PASSWORD_ALEXIS:  "${BOOKLORE_PASSWORD_ALEXIS:-}"
      BOOKLORE_USERNAME_MARION:  "${BOOKLORE_USERNAME_MARION:-}"
      BOOKLORE_PASSWORD_MARION:  "${BOOKLORE_PASSWORD_MARION:-}"
      NEXUS_PUBLIC_URL: "${NEXUS_PUBLIC_URL:-http://localhost}"
      # Expenses (dépenses partagées)
      EXPENSE_DB_PATH: "/nexus-state/expenses.db"
      # Sideloadly
      SIDELOADLY_DB_PATH:     "/sideloadly-local/installations.db"
      SIDELOADLY_APPIDS_PATH: "/sideloadly-local/account-appids.json"
      # State persistence (last played / last session survive container restarts)
      KODI_STATE_PATH: "/nexus-state/kodi-state.json"
      ABS_STATE_PATH:  "/nexus-state/abs-state.json"
      # KODI_USER: "${KODI_USER:-}"
      # KODI_PASS: "${KODI_PASS:-}"
    # Required on Linux for host.docker.internal to resolve to the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount Kodi log file read-only.
      # Set KODI_LOG_PATH_HOST in .env to the path on your host, e.g.:
      #   KODI_LOG_PATH_HOST=/home/user/.kodi/temp/kodi.log
      - "${KODI_LOG_PATH_HOST:-/dev/null}:/kodi.log:ro"
      # Mount ABS log file read-only.
      # Set ABS_LOG_PATH_HOST in .env to the path on your host, e.g.:
      #   ABS_LOG_PATH_HOST=/opt/abs/config/logs/abslog-2024-01-15.txt
      - "${ABS_LOG_PATH_HOST:-/dev/null}:/abs.log:ro"
      # Sideloadly data directory (read-only)
      - "${SIDELOADLY_LOCAL_PATH_HOST:-/dev/null}:/sideloadly-local:ro"
      # State persistence (last played/listened, expenses DB survive container restarts)
      - nexus-state:/nexus-state
    restart: unless-stopped
    expose:
      - "3000"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  nexus-state:
