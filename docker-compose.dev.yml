services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      # Anonymous volume: Docker initializes it from the image's node_modules on first
      # container creation, then keeps it isolated from the host bind-mount above.
      # This means the container always uses Linux node_modules regardless of the host.
      # Run `docker compose -f docker-compose.dev.yml up --build` after any package.json
      # change to force a new anonymous volume with fresh deps.
      - /app/node_modules
    command: npx nx serve api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: "development"
      CORS_ORIGIN: "*"
      KODI_URL:      "${KODI_URL:-http://localhost:8080/jsonrpc}"
      ABS_URL:       "${ABS_URL:-http://localhost:13378}"
      ABS_TOKEN:     "${ABS_TOKEN:-}"
      KODI_LOG_PATH: "${KODI_LOG_PATH:-}"
      ABS_LOG_PATH:  "${ABS_LOG_PATH:-}"
      HOST_METRICS_URL: "${HOST_METRICS_URL:-}"
      PSN_NPSSO:     "${PSN_NPSSO:-}"
      PSN_ONLINE_ID: "${PSN_ONLINE_ID:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules   # same pattern — separate anonymous volume per service
    # Uses ng directly to avoid Nx running `api:serve` again from inside this container
    # (api is already managed by docker compose above).
    # proxy.conf.docker.json points to http://api:3000 instead of localhost:3000.
    command: >
      npx ng serve dashboard
        --host 0.0.0.0
        --proxy-config apps/dashboard/proxy.conf.docker.json
    ports:
      - "4200:4200"
    depends_on:
      - api
    restart: unless-stopped
